# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.x'
        
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore
    
    - name: Test
      run: dotnet test --no-build --verbosity normal

  package:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.x'
        
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore --configuration Release -p:Version=1.0.${{github.run_number}}
    
    - name: Package
      run: dotnet pack -p:PackageVersion=1.0.${{ github.run_number }} -p:RepositoryUrl="${{ github.server_url }}/${{ github.repository }}" -p:RepositoryType=git
    
    - name: Upload package artifacts
      uses: actions/upload-artifact@v7
      with:
        name: nuget-packages
        path: "**/*.nupkg"

  publish:
    needs: package
    runs-on: ubuntu-latest
    # Only publish on pushes to master branch (not on pull requests)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Download package artifacts
      uses: actions/download-artifact@v8
      with:
        name: nuget-packages
        path: ./packages
        
    - name: Publish to GitHub Packages
      run: dotnet nuget push "./packages/**/*.nupkg" --source https://nuget.pkg.github.com/ledgerscope/index.json --api-key ${{secrets.GITHUB_TOKEN}}
